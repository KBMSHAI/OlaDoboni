    <script>

            const webhookUrl = 'https://hook.eu1.make.com/mg2eun8ra3e5kihnxtw559ns468q5a71';
            
            try {
                const response = await fetch(webhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: userInput })
                });
                alert('ההודעה נשלחה למורה דובוני!');
            } catch (error) {
                alert('שגיאה בשליחה: ' + error);
            }
        });
    </script>
</body>
