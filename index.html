<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <style>
        body { background: #1a2f1a; color: white; text-align: center; font-family: sans-serif; overflow: hidden; }
        /* אותיות כוכבים ברקע */
        .star-letter { position: absolute; color: rgba(255,255,255,0.3); font-size: 24px; font-weight: bold; }
        #doboni-container { margin-top: 50px; }
        #doboni-img { width: 300px; border: 3px solid #f0e68c; border-radius: 20px; }
        #response-box { background: rgba(0,0,0,0.6); padding: 20px; width: 60%; margin: 20px auto; border-radius: 10px; min-height: 50px; }
    </style>
</head>
<body>

    <div id="stars"></div>
    <h1>דובוני המורה לאנגלית</h1>
    
    <div id="doboni-container">
        <img id="doboni-img" src="https://ibb.co/pgftkr7" alt="Doboni">
    </div>

    <div id="response-box">דובוני מחכה לשמוע ממך...</div>

    <input type="text" id="user-input" placeholder="כתוב כאן...">
    <button id="send-btn">שלח</button>

    <script>
        // יצירת אותיות כוכבים
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        for(let i=0; i<16; i++) {
            let s = document.createElement('div');
            s.className = 'star-letter';
            s.innerText = letters[Math.floor(Math.random()*26)];
            s.style.top = Math.random()*90 + 'vh';
            s.style.left = Math.random()*90 + 'vw';
            document.getElementById('stars').appendChild(s);
        }

        // שליחה בלחיצת Enter
        document.getElementById('user-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('send-btn').click();
        });

        // פונקציית שליחה
        document.getElementById('send-btn').addEventListener('click', async () => {
            const input = document.getElementById('user-input').value;
            const res = await fetch('https://hook.eu1.make.com/mg2eun8ra3e5kihnxtw559ns468q5a71', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ "content": input })
            });
            const data = await res.json();
            document.getElementById('response-box').innerText = data.avatar_script;
        });
    </script>
</body>
</html>
