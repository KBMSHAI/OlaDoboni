<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doboni Tutor</title>
    <style>
        /* כאן משנים את הצבע בהתאם לנושא השיעור */
        :root { 
            --bg-color: #e0f7fa; /* צבע רקע משתנה */
            --main-color: #ff9800; 
        }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg-color); 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; transition: background-color 0.5s;
        }
        
        .container { 
            background: #fff; padding: 30px; border-radius: 40px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); 
            text-align: center; width: 90%; max-width: 450px; 
        }

        /* עיצוב דמות חלק */
        .character-box { margin-bottom: 25px; }
        img { 
            width: 180px; height: 180px; 
            border-radius: 30px; /* פינות מעוגלות חלקות */
            object-fit: cover; /* מונע עיוות של התמונה */
            border: 4px solid #fff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .chat-box { 
            background: #f1f1f1; padding: 20px; border-radius: 20px; 
            margin-bottom: 20px; min-height: 60px; font-size: 1.1rem;
        }

        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { 
            flex: 1; padding: 15px; border: none; 
            background: #f9f9f9; border-radius: 15px; font-size: 16px;
        }
        
        .btn { padding: 15px 20px; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; }
        .btn-mic { background: #eee; }
        .btn-send { background: var(--main-color); color: white; flex: 1; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Doboni English</h1>
        
        <div class="character-box">
            <img src="דובוני.jpeg" alt="Doboni">
        </div>

        <div id="response-text" class="chat-box">Hi! Let's start the lesson.</div>

        <div class="input-group">
            <input type="text" id="user-input" placeholder="Type or speak...">
            <button class="btn btn-mic" onclick="startDictation()">🎤</button>
        </div>
        
        <button id="send-btn" class="btn btn-send">Send to Doboni</button>
    </div>

    <script>
        function startDictation() {
            const recognition = new webkitSpeechRecognition();
            recognition.lang = 'en-US';
            recognition.start();
            recognition.onresult = (e) => {
                document.getElementById('user-input').value = e.results[0][0].transcript;
            };
        }

        document.getElementById('send-btn').addEventListener('click', async () => {
            const val = document.getElementById('user-input').value;
            if(!val) return;

            document.getElementById('response-text').innerText = "...";
            
            try {
                const res = await fetch('https://hook.eu1.make.com/mg2eun8ra3e5kihnxtw559ns468q5a71', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: val })
                });

                const data = await res.text();
                document.getElementById('response-text').innerText = data;
            } catch (e) {
                document.getElementById('response-text').innerText = "Error communicating.";
            }
        });
    </script>
</body>
</html>
