<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Doboni Tutor</title>
    <style>
        body { font-family: sans-serif; background-color: #fdfdfd; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #fff; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px; }
        img { max-width: 150px; border-radius: 15px; margin-bottom: 20px; }
        .input-group { display: flex; gap: 10px; margin-top: 20px; }
        input { flex: 1; padding: 10px; border: 2px solid #ffb84d; border-radius: 8px; }
        button { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; background: #ffb84d; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Doboni Tutor</h1>
        <img src="דובוני.jpeg" alt="Doboni">
        <div class="input-group">
            <input type="text" id="user-input" placeholder="כתוב כאן...">
            <button onclick="startDictation()">🎤</button>
        </div>
        <button id="send-btn" style="width: 100%; margin-top: 10px;">שלח למורה דובוני</button>
    </div>

    <script>
        function startDictation() {
            var recognition = new webkitSpeechRecognition();
            recognition.lang = 'en-US';
            recognition.start();
            recognition.onresult = function(e) {
                document.getElementById('user-input').value = e.results[0][0].transcript;
            };
        }

        document.getElementById('send-btn').addEventListener('click', async () => {
            const val = document.getElementById('user-input').value;
            await fetch('https://hook.eu1.make.com/mg2eun8ra3e5kihnxtw559ns468q5a71', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: val })
            });
            alert('נשלח!');
        });
    </script>
</body>
</html>
