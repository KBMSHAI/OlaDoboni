<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doboni English Video Tutor</title>
    <style>
        :root { 
            --main-color: #ff9800; /* כתום דובוני */
            --bg-accent: #fdf2e9; 
        }
        
        body { 
            font-family: 'Segoe UI', 'Assistant', sans-serif; 
            /* רקע לימודי - אותיות ומילים באנגלית */
            background-image: url('{{YOUR_ENGLISH_BACKGROUND_IMAGE_URL}}'); 
            background-size: cover; 
            background-position: center; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; padding: 20px;
        }
        
        .container { 
            background: rgba(255, 255, 255, 0.95); /* לבן שקוף מעט */
            padding: 40px; border-radius: 50px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.15); 
            text-align: center; width: 100%; max-width: 500px; 
            backdrop-filter: blur(5px); /* טשטוש עדין מאחור */
        }

        .character-box { margin-bottom: 30px; position: relative; }
        img { 
            width: 220px; height: 220px; 
            border-radius: 50px; /* פינות מעוגלות רכות וחלקות */
            object-fit: cover; /* חיתוך מושלם של התמונה */
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            border: 6px solid #fff;
            background: #fff;
        }

        #response-text { 
            background: #fff3e0; padding: 25px; border-radius: 25px; 
            margin-bottom: 30px; min-height: 100px; font-size: 1.3rem;
            color: #e65100; font-weight: 500; line-height: 1.5;
            border: 2px solid #ffe0b2;
        }

        .input-group { display: flex; gap: 15px; margin-bottom: 25px; }
        input { 
            flex: 1; padding: 18px; border: 2px solid #ddd; 
            border-radius: 20px; font-size: 16px; outline: none;
            transition: border-color 0.3s;
        }
        input:focus { border-color: var(--main-color); }
        
        button { 
            padding: 18px 28px; border: none; border-radius: 20px; 
            cursor: pointer; font-weight: bold; transition: 0.3s;
            font-size: 16px;
        }
        .btn-mic { background: #eee; font-size: 22px; }
        .btn-send { background: var(--main-color); color: white; flex: 1; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="container">
        <h1>Doboni Video Learning</h1>
        <div class="character-box">
            <img src="{{YOUR_DOBONI_IMAGE_URL}}" alt="Doboni Video Tutor">
        </div>

        <div id="response-text">Hi! I'm Doboni. What do you want to learn today?</div>

        <div class="input-group">
            <input type="text" id="user-input" placeholder="Type topic (e.g., Summer)...">
            <button class="btn-mic" onclick="startDictation()">🎤</button>
        </div>
        
        <button id="send-btn" class="btn-send">Send to Doboni</button>
    </div>

    <script>
        function startDictation() {
            if (!window.webkitSpeechRecognition) { alert("הדפדפן לא תומך בזיהוי קולי"); return; }
            const recognition = new webkitSpeechRecognition();
            recognition.lang = 'en-US';
            recognition.start();
            recognition.onresult = (e) => {
                document.getElementById('user-input').value = e.results[0][0].transcript;
            };
        }

        document.getElementById('send-btn').addEventListener('click', async () => {
            const userInputField = document.getElementById('user-input');
            const val = userInputField.value;
            if(!val) return;

            document.getElementById('response-text').innerText = "Thinking...";
            userInputField.value = ''; // ניקוי התיבה

            try {
                const res = await fetch('https://hook.eu1.make.com/mg2eun8ra3e5kihnxtw559ns468q5a71', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ "content": val })
                });

                // <<-- כאן בדיוק! -->> ה-JSON.parse מתבצע על הטקסט שחוזר מה-Make
                const rawData = await res.text(); 
                console.log("Raw from Make:", rawData); // הדפסה לבדיקה ב-Console
                
                try {
                    const data = JSON.parse(rawData);
                    // כאן אנחנו משתמשים רק ב-script של דובוני להצגה בתיבה
                    document.getElementById('response-text').innerText = data.avatar_script;
                } catch (jsonError) {
                    console.error("JSON parsing error:", jsonError);
                    document.getElementById('response-text').innerText = rawData; // הדפסת הגולמי במקרה שגיאה
                }

            } catch (e) {
                document.getElementById('response-text').innerText = "Network Error.";
                console.error(e);
            }
        });
    </script>
</body>
</html>
