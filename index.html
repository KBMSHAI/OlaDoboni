<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Doboni Video Learning</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            /* רקע עם אותיות באנגלית */
            background-image: url('https://images.unsplash.com/photo-1503676260728-1c00da094a0b?auto=format&fit=crop&w=1600&q=80');
            background-size: cover; background-position: center;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0;
        }
        .container { 
            background: rgba(255, 255, 255, 0.9); padding: 40px; border-radius: 40px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.3); text-align: center; 
            width: 90%; max-width: 450px;
        }
        .character-box img { 
            width: 250px; height: 250px; border-radius: 30px; 
            object-fit: cover; border: 8px solid #ff9800;
            margin-bottom: 20px;
        }
        #response-text { 
            background: #fff3e0; padding: 20px; border-radius: 20px; 
            margin-bottom: 20px; min-height: 80px; font-size: 1.2rem;
            color: #e65100; font-weight: bold;
        }
        .input-group { display: flex; gap: 10px; }
        input { flex: 1; padding: 15px; border-radius: 15px; border: 2px solid #ccc; }
        .btn-send { background: #ff9800; color: white; padding: 15px 25px; border: none; border-radius: 15px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Doboni Video Learning</h1>
        <div class="character-box">
            <img src="https://i.ibb.co/220260119/avatar-casual.jpg" alt="Doboni">
        </div>

        <div id="response-text">Hi! I'm Doboni. What do you want to learn today?</div>

        <div class="input-group">
            <input type="text" id="user-input" placeholder="Type topic (e.g., Summer)...">
            <button class="btn-send" id="send-btn">Send</button>
        </div>
    </div>

    <script>
        document.getElementById('send-btn').addEventListener('click', async () => {
            const val = document.getElementById('user-input').value;
            if(!val) return;

            const resDiv = document.getElementById('response-text');
            resDiv.innerText = "Doboni is thinking...";

            try {
                const res = await fetch('https://hook.eu1.make.com/mg2eun8ra3e5kihnxtw559ns468q5a71', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ "content": val })
                });

                const rawData = await res.text();
                // הניסיון לפענח את התשובה כ-JSON
                const data = JSON.parse(rawData);
                
                // מציג רק את הטקסט של הסקריפט
                resDiv.innerText = data.avatar_script || "Got it!";
            } catch (e) {
                resDiv.innerText = "Error - check Make Scenario logs!";
            }
        });
    </script>
</body>
</html>
